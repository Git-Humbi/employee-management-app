<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMS | Add Contact</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">EMS Pro</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="new-contact.html" class="active">Add New Contact</a></li>
            <li><a href="view-contacts.html">View All Contacts</a></li>
        </ul>
    </nav>

    <main class="main-container">
        <div class="form-wrapper">
            <h2>Add New Employee</h2>
            <form class="contact-form">
                <div class="form-group">
                    <label>ID Number</label>
                    <input type="text" placeholder="e.g. 12345678" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" placeholder="First Name" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" placeholder="Last Name" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Gender</label>
                    <div class="radio-options">
                        <label><input type="radio" name="gender" value="Male"> Male</label>
                        <label><input type="radio" name="gender" value="Female"> Female</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" value="+2547" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="email@company.com" required>
                </div>
                <div class="form-group">
                    <label>Position</label>
                    <select required>
                        <option value="" disabled selected>- Select Position -</option>
                        <option>Manager</option>
                        <option>HR Specialist</option>
                        <option>Software Engineer</option>
                        <option>UI/UX Designer</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary">Save Employee</button>
            </form>
        </div>
    </main>
</body>
</html>
